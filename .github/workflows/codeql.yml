name: CodeQL

on:
  workflow_dispatch:
  workflow_call:

permissions:
  security-events: write # Required for uploads to GHAS

jobs:
  build:
    uses: ./.github/workflows/build.yml

  analyze:
    name: Analyze
    needs: build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: ['go']
        query:    ['security-extended, security-and-quality']

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: List
      run: ls -R
    - name: Artifact
      uses: actions/download-artifact@v8
      with:
        name: build
        path: submodule
    - name: List
      run: ls -R

    - name: Initialization 
      uses: github/codeql-action/init@v4
      with:
        languages:  ${{ matrix.language }}
        queries: ${{ matrix.query }}
        #source-root: src

    - name: Analysis
      id: analyze
      uses: github/codeql-action/analyze@v4

#      - name: Upload
#        uses: github/codeql-action/upload-sarif@v4
