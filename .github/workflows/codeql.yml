name: CodeQL

on:
  workflow_dispatch:
  workflow_call:

permissions:
  #actions: read
  #checks: write
  contents: read
  security-events: write # Required for uploads to GHAS

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: ['go']
        version:  ['1.26']
        query:    ['security-extended, security-and-quality']

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.version }}

      - name: Build
        working-directory: ./submodule
        run: |
          go mod download
          go build ./...

#      - name: Autobuild
#        id: autobuild
#        uses: github/codeql-action/autobuild@v4

      - name: Initialization 
        uses: github/codeql-action/init@v4
        with:
          languages:  ${{ matrix.language }}
          queries: ${{ matrix.query }}
          #source-root: src

      - name: Analysis
        id: analyze
        uses: github/codeql-action/analyze@v4
        with:
          sha: ${{ github.sha }}
          ref: ${{ github.ref }}
          #upload: false # Default auto-runs upload-sarif (ref. https://github.com/github/codeql-action/#usage)

#      - name: Upload
