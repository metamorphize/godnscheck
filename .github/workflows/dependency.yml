name: Dependency Review

on:
  workflow_dispatch:
    inputs:
      base-ref:
        type: string
      head-ref:
        type: string
  workflow_call:
    inputs:
      base-ref:
        type: string
      head-ref:
        type: string

permissions:
  contents: read
  security-events: write # Required for uploads to GHAS

jobs:
  build:
    uses: ./.github/workflows/build.yml

  dependency:
    name: Review
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Artifact
      uses: actions/download-artifact@v8
      with:
        name: build
        path: submodule
      
    - name: Dependency Review
      uses: actions/dependency-review-action@v5
      with:
        base-ref: ${{ inputs.base-ref || github.base_ref }}
        head-ref: ${{ inputs.head-ref || github.head_ref }}
