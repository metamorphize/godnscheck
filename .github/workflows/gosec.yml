name: gosec

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    uses: ./.github/workflows/build.yml

  scan:
    name: 
    runs-on: ubuntu-latest
    needs: build

    env:
      GO111MODULE: on

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Artifact
      uses: actions/download-artifact@v8
      with:
        name: build
        path: submodule

    - name: Scan
      uses: securego/gosec@master
      with:
        args: submodule -r -show-ignored -verbose text
